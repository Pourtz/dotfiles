[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected =

[module/wired-network]
inherit = network-base
interface = eno1
interface-type = wired

label-connected = " %netspeed%"
format-connected-prefix = 
format-connected-prefix-foreground = ${color.primary}
format-connected-prefix-font = 2

[module/wireless-network]
inherit = network-base
interface = wlo1
interface-type = wireless
label-connected = "  %essid% %netspeed%"
format-connected-prefix = 
format-connected-prefix-foreground = ${color.primary}
format-connected-prefix-font = 2

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/keyboard]
type = internal/xkeyboard

; List of indicators to ignore
blacklist-0 = num
;lock

; Available tags:
;   <label-layout> (default)
;   <label-indicator> (default)
format = <label-layout> <label-indicator>
format-prefix = 
format-prefix-foreground = ${color.primary}
format-prefix-font = 2

; Available tokens:
;   %layout%
;   %name%
;   %number%
; Default: %layout%
label-layout = "  %layout%"

; Available tokens:
;   %name%
; Default: %name%
label-indicator-on = " %name% "
label-indicator-on-background = ${color.primary}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/title]
type = internal/xwindow

; Available tags:
;   <label> (default)
format = <label>
format-prefix =

; Available tokens:
;   %title%
; Default: %title%
label = "%title%"
label-maxlen = 30

; Used instead of label when there is no window title
;;label-empty = Arch Linux

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/workspaces]
type = internal/xworkspaces

format = <label-state>
format-padding = 0

label-monitor = %name%

label-active = %name%
label-active-foreground = ${color.primary}
label-active-overline = ${color.primary}

label-occupied = %name%
label-occupied-foreground = ${color.alternate}

label-urgent = %name%
label-urgent-foreground = ${color.secondary}

label-empty = %name%

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1
